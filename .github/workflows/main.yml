name: Daily Stock Report Update

on:
  schedule:
    # 매일 UTC 기준 23시, 7시, 14시 (한국시간 아침 8시, 오후 4시, 밤 11시)에 실행
    - cron: '0 23,7,14 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

- name: Install dependencies
        run: |
          pip install pandas requests beautifulsoup4 yfinance

      - name: Run analysis script
        run: python update_report.py # 데이터를 긁어와서 index.html을 만드는 파이썬 파일

      - name: Commit and Push
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add index.html
          git commit -m "Auto-update report: $(date)"
          git push https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/${{ github.repository }}.git main
